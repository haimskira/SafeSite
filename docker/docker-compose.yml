version: '3.8'

# Define a custom network to isolate this project completely
networks:
  safesite_net:
    driver: bridge

services:
  backend:
    build:
      context: ../back
      dockerfile: ../docker/backend.Dockerfile
    container_name: safesite_backend
    networks:
      - safesite_net
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/app
    restart: always
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ../front
      dockerfile: ../docker/frontend.Dockerfile
      args:
        # VITE_API_URL can be injected here during build if required for production
        - VITE_API_URL=http://localhost:8080
    container_name: safesite_frontend
    networks:
      - safesite_net
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  sqlite_data:

